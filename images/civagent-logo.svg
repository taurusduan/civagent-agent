<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8962E"/>
    </linearGradient>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A5FAA"/>
      <stop offset="100%" stop-color="#1B365D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pillar Capital (top) -->
  <rect x="45" y="30" width="110" height="12" rx="2" fill="url(#pillarGrad)"/>
  <rect x="50" y="42" width="100" height="6" rx="1" fill="url(#pillarGrad)" opacity="0.85"/>
  <!-- Volute scrolls -->
  <path d="M45 30 Q35 25 38 18 Q42 12 50 15 Q55 18 50 24 L45 30" fill="url(#pillarGrad)" opacity="0.9"/>
  <path d="M155 30 Q165 25 162 18 Q158 12 150 15 Q145 18 150 24 L155 30" fill="url(#pillarGrad)" opacity="0.9"/>

  <!-- Pillar Shaft with fluting -->
  <rect x="60" y="48" width="80" height="110" rx="3" fill="url(#pillarGrad)"/>
  <!-- Fluting lines -->
  <line x1="72" y1="52" x2="72" y2="154" stroke="#B8962E" stroke-width="1" opacity="0.4"/>
  <line x1="84" y1="52" x2="84" y2="154" stroke="#B8962E" stroke-width="1" opacity="0.4"/>
  <line x1="96" y1="52" x2="96" y2="154" stroke="#B8962E" stroke-width="1" opacity="0.4"/>
  <line x1="108" y1="52" x2="108" y2="154" stroke="#B8962E" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="52" x2="120" y2="154" stroke="#B8962E" stroke-width="1" opacity="0.4"/>
  <line x1="132" y1="52" x2="132" y2="154" stroke="#B8962E" stroke-width="1" opacity="0.4"/>

  <!-- Pillar Base -->
  <rect x="55" y="158" width="90" height="8" rx="2" fill="url(#pillarGrad)"/>
  <rect x="50" y="166" width="100" height="10" rx="2" fill="url(#pillarGrad)" opacity="0.9"/>

  <!-- Circuit / Node Pattern overlaid on pillar -->
  <!-- Main circuit nodes -->
  <circle cx="80" cy="70" r="5" fill="url(#techGrad)" filter="url(#glow)"/>
  <circle cx="120" cy="70" r="5" fill="url(#techGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="7" fill="url(#techGrad)" filter="url(#glow)"/>
  <circle cx="75" cy="130" r="5" fill="url(#techGrad)" filter="url(#glow)"/>
  <circle cx="125" cy="130" r="5" fill="url(#techGrad)" filter="url(#glow)"/>

  <!-- Circuit connections -->
  <line x1="80" y1="70" x2="100" y2="100" stroke="#1B365D" stroke-width="2" opacity="0.7"/>
  <line x1="120" y1="70" x2="100" y2="100" stroke="#1B365D" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="100" x2="75" y2="130" stroke="#1B365D" stroke-width="2" opacity="0.7"/>
  <line x1="100" y1="100" x2="125" y2="130" stroke="#1B365D" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="70" x2="120" y2="70" stroke="#1B365D" stroke-width="1.5" opacity="0.5"/>
  <line x1="75" y1="130" x2="125" y2="130" stroke="#1B365D" stroke-width="1.5" opacity="0.5"/>

  <!-- Outer circuit branches extending beyond pillar -->
  <circle cx="40" cy="85" r="3.5" fill="url(#techGrad)" filter="url(#glow)"/>
  <circle cx="160" cy="85" r="3.5" fill="url(#techGrad)" filter="url(#glow)"/>
  <circle cx="35" cy="115" r="3" fill="url(#techGrad)" opacity="0.7"/>
  <circle cx="165" cy="115" r="3" fill="url(#techGrad)" opacity="0.7"/>
  <line x1="80" y1="70" x2="40" y2="85" stroke="#1B365D" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="70" x2="160" y2="85" stroke="#1B365D" stroke-width="1.5" opacity="0.5"/>
  <line x1="40" y1="85" x2="35" y2="115" stroke="#1B365D" stroke-width="1" opacity="0.4"/>
  <line x1="160" y1="85" x2="165" y2="115" stroke="#1B365D" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="115" x2="75" y2="130" stroke="#1B365D" stroke-width="1" opacity="0.35"/>
  <line x1="165" y1="115" x2="125" y2="130" stroke="#1B365D" stroke-width="1" opacity="0.35"/>

  <!-- Inner node highlights -->
  <circle cx="80" cy="70" r="2.5" fill="#4A90D9" opacity="0.6"/>
  <circle cx="120" cy="70" r="2.5" fill="#4A90D9" opacity="0.6"/>
  <circle cx="100" cy="100" r="3.5" fill="#4A90D9" opacity="0.6"/>
  <circle cx="75" cy="130" r="2.5" fill="#4A90D9" opacity="0.6"/>
  <circle cx="125" cy="130" r="2.5" fill="#4A90D9" opacity="0.6"/>

  <!-- Text: CivAgent -->
  <text x="100" y="210" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#1B365D" letter-spacing="2">
    CivAgent
  </text>
  <!-- Subtle underline accent -->
  <line x1="55" y1="218" x2="145" y2="218" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>
</svg>