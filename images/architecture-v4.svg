<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="620" fill="url(#bg2)" rx="10"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#d4a574" font-family="monospace" font-size="16" font-weight="bold">CivAgent v4 Architecture</text>

  <!-- User -->
  <rect x="370" y="50" width="160" height="40" rx="8" fill="#1f6feb" opacity="0.8"/>
  <text x="450" y="75" text-anchor="middle" fill="white" font-family="monospace" font-size="13">You (陛下)</text>

  <!-- Arrow down -->
  <line x1="450" y1="90" x2="450" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/></marker></defs>

  <!-- civagent CLI -->
  <rect x="330" y="115" width="240" height="40" rx="8" fill="#238636" opacity="0.8"/>
  <text x="450" y="140" text-anchor="middle" fill="white" font-family="monospace" font-size="13">civagent run --mode tang</text>

  <!-- Arrow down -->
  <line x1="450" y1="155" x2="450" y2="180" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Claude Code main -->
  <rect x="280" y="180" width="340" height="45" rx="8" fill="#6e40c9" opacity="0.8"/>
  <text x="450" y="200" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">Claude Code (Opus)</text>
  <text x="450" y="216" text-anchor="middle" fill="#ccc" font-family="monospace" font-size="10">--agents regime.json --system-prompt SOUL.md</text>

  <!-- Fan out to agents -->
  <!-- Left group: Strong models -->
  <line x1="350" y1="225" x2="130" y2="280" stroke="#6e40c9" stroke-width="1.5"/>
  <line x1="400" y1="225" x2="310" y2="280" stroke="#6e40c9" stroke-width="1.5"/>
  <line x1="450" y1="225" x2="450" y2="280" stroke="#6e40c9" stroke-width="1.5"/>
  <line x1="500" y1="225" x2="590" y2="280" stroke="#6e40c9" stroke-width="1.5"/>
  <line x1="550" y1="225" x2="770" y2="280" stroke="#6e40c9" stroke-width="1.5"/>

  <!-- Agent boxes row 1 -->
  <rect x="50" y="280" width="160" height="50" rx="6" fill="#21262d" stroke="#d4a574" stroke-width="1.5"/>
  <text x="130" y="300" text-anchor="middle" fill="#d4a574" font-family="monospace" font-size="12" font-weight="bold">司礼监 Coordinator</text>
  <text x="130" y="318" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Sonnet — routing</text>

  <rect x="230" y="280" width="160" height="50" rx="6" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
