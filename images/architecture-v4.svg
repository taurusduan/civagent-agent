  <text x="490" y="318" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Codex adversarial</text>

  <rect x="590" y="280" width="160" height="50" rx="6" fill="#21262d" stroke="#a5d6ff" stroke-width="1.5"/>
  <text x="670" y="300" text-anchor="middle" fill="#a5d6ff" font-family="monospace" font-size="12" font-weight="bold">翰林院 Research</text>
  <text x="670" y="318" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Gemini 1M ctx</text>

  <rect x="50" y="350" width="160" height="50" rx="6" fill="#21262d" stroke="#7ee787" stroke-width="1.5"/>
  <text x="130" y="370" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="12" font-weight="bold">户部 Data/SQL</text>
  <text x="130" y="388" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">cn:qwen</text>

  <rect x="230" y="350" width="160" height="50" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <text x="310" y="370" text-anchor="middle" fill="#ccc" font-family="monospace" font-size="12" font-weight="bold">工部 DevOps</text>
  <text x="310" y="388" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Sonnet + Bash</text>

  <rect x="410" y="350" width="160" height="50" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <text x="490" y="370" text-anchor="middle" fill="#ccc" font-family="monospace" font-size="12" font-weight="bold">礼部 Content</text>
  <text x="490" y="388" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Sonnet / cn:doubao</text>

  <rect x="590" y="350" width="160" height="50" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <text x="670" y="370" text-anchor="middle" fill="#ccc" font-family="monospace" font-size="12" font-weight="bold">刑部 / 吏部</text>
  <text x="670" y="388" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Sonnet</text>

  <!-- Model layer -->
  <line x1="50" y1="430" x2="850" y2="430" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="455" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="12">Model Layer</text>

  <!-- Model boxes -->
  <rect x="50" y="470" width="120" height="36" rx="6" fill="#6e40c9" opacity="0.6"/>
  <text x="110" y="493" text-anchor="middle" fill="white" font-family="monospace" font-size="11">Claude Opus</text>

  <rect x="185" y="470" width="120" height="36" rx="6" fill="#6e40c9" opacity="0.4"/>
  <text x="245" y="493" text-anchor="middle" fill="white" font-family="monospace" font-size="11">Claude Sonnet</text>

  <rect x="320" y="470" width="120" height="36" rx="6" fill="#238636" opacity="0.6"/>
  <text x="380" y="493" text-anchor="middle" fill="white" font-family="monospace" font-size="11">Codex GPT-5.4</text>

  <rect x="455" y="470" width="120" height="36" rx="6" fill="#1f6feb" opacity="0.6"/>
  <text x="515" y="493" text-anchor="middle" fill="white" font-family="monospace" font-size="11">Gemini 2.5</text>

  <rect x="50" y="520" width="120" height="36" rx="6" fill="#f0883e" opacity="0.4"/>
  <text x="110" y="543" text-anchor="middle" fill="white" font-family="monospace" font-size="11">cn:doubao</text>

  <rect x="185" y="520" width="100" height="36" rx="6" fill="#f0883e" opacity="0.4"/>
  <text x="235" y="543" text-anchor="middle" fill="white" font-family="monospace" font-size="11">cn:qwen</text>

  <rect x="300" y="520" width="100" height="36" rx="6" fill="#f0883e" opacity="0.4"/>
  <text x="350" y="543" text-anchor="middle" fill="white" font-family="monospace" font-size="11">cn:kimi</text>

  <rect x="415" y="520" width="90" height="36" rx="6" fill="#f0883e" opacity="0.4"/>
  <text x="460" y="543" text-anchor="middle" fill="white" font-family="monospace" font-size="11">cn:glm</text>

  <rect x="520" y="520" width="110" height="36" rx="6" fill="#f0883e" opacity="0.4"/>
  <text x="575" y="543" text-anchor="middle" fill="white" font-family="monospace" font-size="11">cn:stepfun</text>

  <rect x="645" y="520" width="120" height="36" rx="6" fill="#f0883e" opacity="0.4"/>
  <text x="705" y="543" text-anchor="middle" fill="white" font-family="monospace" font-size="11">cn:minimax</text>

  <!-- Legend -->
  <text x="750" y="490" fill="#8b949e" font-family="monospace" font-size="10">4 primary</text>
  <text x="810" y="543" fill="#8b949e" font-family="monospace" font-size="10">6 CN</text>

  <!-- Footer -->
  <text x="450" y="600" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">10 models · 57 regimes · 6 orchestration modes · pure configuration</text>
</svg>
