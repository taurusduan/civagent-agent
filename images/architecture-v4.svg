  <text x="310" y="318" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Opus / Codex</text>

  <rect x="410" y="280" width="160" height="50" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1.5"/>
