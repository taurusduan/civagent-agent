<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="bPillarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8962E"/>
    </linearGradient>
    <linearGradient id="bTechGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#1B365D"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="bGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Subtle grid pattern for background -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#21262D" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>
  <rect width="900" height="300" fill="url(#grid)" opacity="0.4"/>

  <!-- Decorative horizontal lines -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="299" x2="900" y2="299" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>

  <!-- ==================== LEFT SIDE: Logo Icon ==================== -->
  <g transform="translate(70, 45) scale(0.85)">
    <!-- Pillar Capital -->
    <rect x="30" y="15" width="80" height="9" rx="2" fill="url(#bPillarGrad)"/>
    <rect x="34" y="24" width="72" height="5" rx="1" fill="url(#bPillarGrad)" opacity="0.85"/>
    <!-- Volute scrolls -->
    <path d="M30 15 Q22 11 24 5 Q27 0 34 3 Q38 5 34 11 L30 15" fill="url(#bPillarGrad)" opacity="0.9"/>
    <path d="M110 15 Q118 11 116 5 Q113 0 106 3 Q102 5 106 11 L110 15" fill="url(#bPillarGrad)" opacity="0.9"/>

    <!-- Pillar Shaft -->
    <rect x="40" y="29" width="60" height="85" rx="2" fill="url(#bPillarGrad)"/>
    <!-- Fluting -->
    <line x1="50" y1="33" x2="50" y2="110" stroke="#B8962E" stroke-width="0.8" opacity="0.4"/>
    <line x1="60" y1="33" x2="60" y2="110" stroke="#B8962E" stroke-width="0.8" opacity="0.4"/>
    <line x1="70" y1="33" x2="70" y2="110" stroke="#B8962E" stroke-width="0.8" opacity="0.4"/>
    <line x1="80" y1="33" x2="80" y2="110" stroke="#B8962E" stroke-width="0.8" opacity="0.4"/>
    <line x1="90" y1="33" x2="90" y2="110" stroke="#B8962E" stroke-width="0.8" opacity="0.4"/>

    <!-- Pillar Base -->
    <rect x="36" y="114" width="68" height="6" rx="1" fill="url(#bPillarGrad)"/>
    <rect x="32" y="120" width="76" height="8" rx="2" fill="url(#bPillarGrad)" opacity="0.9"/>

    <!-- Circuit nodes on pillar -->
    <circle cx="55" cy="48" r="4" fill="url(#bTechGrad)" filter="url(#bGlow)"/>
    <circle cx="85" cy="48" r="4" fill="url(#bTechGrad)" filter="url(#bGlow)"/>
    <circle cx="70" cy="72" r="5.5" fill="url(#bTechGrad)" filter="url(#bGlow)"/>
    <circle cx="52" cy="98" r="4" fill="url(#bTechGrad)" filter="url(#bGlow)"/>
    <circle cx="88" cy="98" r="4" fill="url(#bTechGrad)" filter="url(#bGlow)"/>

    <!-- Circuit connections -->
    <line x1="55" y1="48" x2="70" y2="72" stroke="#4A90D9" stroke-width="1.5" opacity="0.7"/>
    <line x1="85" y1="48" x2="70" y2="72" stroke="#4A90D9" stroke-width="1.5" opacity="0.7"/>
    <line x1="70" y1="72" x2="52" y2="98" stroke="#4A90D9" stroke-width="1.5" opacity="0.7"/>
    <line x1="70" y1="72" x2="88" y2="98" stroke="#4A90D9" stroke-width="1.5" opacity="0.7"/>
    <line x1="55" y1="48" x2="85" y2="48" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <line x1="52" y1="98" x2="88" y2="98" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>

    <!-- Outer branches -->
    <circle cx="25" cy="60" r="3" fill="url(#bTechGrad)" filter="url(#bGlow)"/>
    <circle cx="115" cy="60" r="3" fill="url(#bTechGrad)" filter="url(#bGlow)"/>
    <line x1="55" y1="48" x2="25" y2="60" stroke="#4A90D9" stroke-width="1" opacity="0.45"/>
    <line x1="85" y1="48" x2="115" y2="60" stroke="#4A90D9" stroke-width="1" opacity="0.45"/>

    <!-- Node highlights -->
    <circle cx="55" cy="48" r="2" fill="#6CB4EE" opacity="0.5"/>
    <circle cx="85" cy="48" r="2" fill="#6CB4EE" opacity="0.5"/>
    <circle cx="70" cy="72" r="3" fill="#6CB4EE" opacity="0.5"/>
    <circle cx="52" cy="98" r="2" fill="#6CB4EE" opacity="0.5"/>
    <circle cx="88" cy="98" r="2" fill="#6CB4EE" opacity="0.5"/>
  </g>

  <!-- ==================== CENTER: Title Text ==================== -->
  <text x="370" y="125" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF" filter="url(#textShadow)" letter-spacing="4">
    CivAgent
  </text>

  <!-- Subtitle -->
  <text x="370" y="165" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="url(#goldText)" letter-spacing="6">
    AI
  </text>
  <text x="408" y="165" font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="300" fill="url(#goldText)" letter-spacing="6">
    &#25991;&#26126;
  </text>

  <!-- Separator line -->
  <line x1="370" y1="180" x2="620" y2="180" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>

  <!-- ==================== RIGHT SIDE: 6 Pattern Icons ==================== -->
  <g transform="translate(700, 55)" opacity="0.7">
    <!-- Row 1 -->
    <!-- 1. Crown (Theocratic) -->
    <g transform="translate(0, 0)">
      <path d="M5 22 L10 8 L15 16 L20 4 L25 16 L30 8 L35 22 Z" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
      <rect x="5" y="22" width="30" height="5" rx="1" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
      <circle cx="20" cy="4" r="2" fill="#D4AF37" opacity="0.6"/>
      <text x="20" y="38" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#8B949E">Theocratic</text>
    </g>

    <!-- 2. Balance Scale (Checks & Balances) -->
    <g transform="translate(60, 0)">
      <line x1="20" y1="4" x2="20" y2="22" stroke="#D4AF37" stroke-width="1.5"/>
      <line x1="6" y1="10" x2="34" y2="10" stroke="#D4AF37" stroke-width="1.5"/>
      <path d="M4 10 L10 22 L16 22 Z" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
      <path d="M24 22 L30 22 L36 10 Z" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
      <rect x="15" y="22" width="10" height="4" rx="1" fill="none" stroke="#D4AF37" stroke-width="1"/>
      <text x="20" y="38" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#8B949E">Checks</text>
    </g>

    <!-- 3. Dual Arrows (Dual Power) -->
    <g transform="translate(120, 0)">
      <path d="M10 6 L20 14 L10 22" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M30 6 L20 14 L30 22" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="14" r="2.5" fill="#D4AF37" opacity="0.5"/>
      <text x="20" y="38" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#8B949E">Dual</text>
    </g>

    <!-- Row 2 -->
    <!-- 4. Grid (Federated) -->
    <g transform="translate(0, 60)">
      <rect x="6" y="4" width="10" height="10" rx="1.5" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
      <rect x="24" y="4" width="10" height="10" rx="1.5" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
      <rect x="6" y="16" width="10" height="10" rx="1.5" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
      <rect x="24" y="16" width="10" height="10" rx="1.5" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
      <line x1="16" y1="9" x2="24" y2="9" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>
      <line x1="16" y1="21" x2="24" y2="21" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>
      <line x1="11" y1="14" x2="11" y2="16" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>
      <line x1="29" y1="14" x2="29" y2="16" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>
      <text x="20" y="38" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#8B949E">Federated</text>
    </g>

    <!-- 5. Ballot Box (Democratic) -->
    <g transform="translate(60, 60)">
      <rect x="8" y="8" width="24" height="18" rx="2" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
      <line x1="8" y1="14" x2="32" y2="14" stroke="#D4AF37" stroke-width="1"/>
      <rect x="16" y="4" width="8" height="6" rx="1" fill="none" stroke="#D4AF37" stroke-width="1"/>
      <line x1="15" y1="19" x2="25" y2="19" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
      <line x1="15" y1="22" x2="22" y2="22" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
      <text x="20" y="38" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#8B949E">Democratic</text>
    </g>

    <!-- 6. Pyramid (Centralized) -->
    <g transform="translate(120, 60)">
      <path d="M20 4 L6 26 L34 26 Z" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
      <line x1="13" y1="15" x2="27" y2="15" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>
      <line x1="10" y1="21" x2="30" y2="21" stroke="#D4AF37" stroke-width="0.8" opacity="0.6"/>
      <circle cx="20" cy="10" r="2" fill="#D4AF37" opacity="0.5"/>
      <text x="20" y="38" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#8B949E">Centralized</text>
    </g>
  </g>

  <!-- ==================== BOTTOM: Tagline ==================== -->
  <text x="450" y="262" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="2">
    <tspan fill="#8B949E">57 Civilizations</tspan>
    <tspan fill="#D4AF37" opacity="0.8"> &#xB7; </tspan>
    <tspan fill="#8B949E">6 Patterns</tspan>
    <tspan fill="#D4AF37" opacity="0.8"> &#xB7; </tspan>
    <tspan fill="#8B949E">Zero Code</tspan>
  </text>

  <!-- Subtle decorative dots in background -->
  <circle cx="300" cy="230" r="1" fill="#D4AF37" opacity="0.15"/>
  <circle cx="600" cy="230" r="1" fill="#D4AF37" opacity="0.15"/>
  <circle cx="250" cy="80" r="1.5" fill="#4A90D9" opacity="0.1"/>
  <circle cx="650" cy="80" r="1.5" fill="#4A90D9" opacity="0.1"/>
</svg>