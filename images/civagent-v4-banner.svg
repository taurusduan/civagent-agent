<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="50%" style="stop-color:#f0d9a0"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="600" y="95" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="56" font-weight="bold">CivAgent v4</text>
  <text x="600" y="140" text-anchor="middle" fill="#8899aa" font-family="monospace" font-size="20">Claude Code Runtime</text>
  <!-- Subtitle -->
  <text x="600" y="190" text-anchor="middle" fill="#ccccdd" font-family="sans-serif" font-size="18">5000 Years of Governance Wisdom × AI Multi-Agent Orchestration</text>
  <!-- Stats -->
  <text x="200" y="250" text-anchor="middle" fill="#d4a574" font-family="monospace" font-size="14">57 Regimes</text>
  <text x="400" y="250" text-anchor="middle" fill="#7ec8e3" font-family="monospace" font-size="14">6 Modes</text>
  <text x="600" y="250" text-anchor="middle" fill="#a3d977" font-family="monospace" font-size="14">10 Models</text>
  <text x="800" y="250" text-anchor="middle" fill="#e8a0bf" font-family="monospace" font-size="14">CC + Codex + Gemini</text>
  <text x="1000" y="250" text-anchor="middle" fill="#f0d9a0" font-family="monospace" font-size="14">6 CN Backends</text>
  <!-- Decorative lines -->
  <line x1="100" y1="160" x2="1100" y2="160" stroke="#333355" stroke-width="1"/>
  <line x1="100" y1="220" x2="1100" y2="220" stroke="#333355" stroke-width="1"/>
</svg>
